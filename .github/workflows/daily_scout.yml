name: Daily Content Scout Mailer

on:
  schedule:
    # 22:00 UTC = 5:00 AM Vietnam
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-scout:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Content Scout
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python content_scout_mailer.py
